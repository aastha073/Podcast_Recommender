stages:

  # ── Stage 0: Extract RSS data ──────────────────────────────────────────────
  extract_rss:
    cmd: python -m src.data.extract_rss --seed-file data/raw/seed_feeds.txt --raw-jsonl data/raw/rss_feeds.jsonl --metadata-json data/raw/rss_metadata.json --processed-dir data/processed --summary-path metrics/rss_scrape_summary.json
    deps:
      - src/data/extract_rss.py
      - src/data/rss_discovery.py
      - src/data/rss_scraper.py
      - src/data/normalize.py
      - data/raw/seed_feeds.txt
    outs:
      - data/raw/rss_feeds.jsonl
      - data/raw/rss_metadata.json
      - data/processed/podcasts.parquet
      - data/processed/interactions.parquet
    metrics:
      - metrics/rss_scrape_summary.json:
          cache: false

  # ── Stage 1: Prepare data ────────────────────────────────────────────────
  prepare:
    cmd: python -m src.data.loader --config configs/config.yaml --source rss --output-dir data/processed
    deps:
      - src/data/loader.py
      - configs/config.yaml
      - data/processed/podcasts.parquet
      - data/processed/interactions.parquet
    outs:
      - data/processed/podcasts.parquet
      - data/processed/interactions.parquet
    params:
      - configs/config.yaml:
          - data.min_interactions
          - data.test_size
          - data.random_seed

  # ── Stage 2: Train embedder ───────────────────────────────────────────────
  embed:
    cmd: python -m src.models.embedder
    deps:
      - src/models/embedder.py
      - data/processed/podcasts.parquet
    outs:
      - data/processed/embeddings.npy
      - models/embedder/
    params:
      - configs/config.yaml:
          - embedder.model_name
          - embedder.batch_size
          - embedder.max_seq_length

  # ── Stage 3: Train collaborative filter ──────────────────────────────────
  collaborate:
    cmd: python -m src.models.collaborative
    deps:
      - src/models/collaborative.py
      - data/processed/interactions.parquet
    outs:
      - models/cf_model.pkl
    metrics:
      - metrics/cf_metrics.json:
          cache: false
    params:
      - configs/config.yaml:
          - collaborative.n_factors
          - collaborative.n_epochs
          - collaborative.lr_all
          - collaborative.reg_all

  # ── Stage 4: Train ranker ─────────────────────────────────────────────────
  rank:
    cmd: python -m src.models.ranker
    deps:
      - src/models/ranker.py
      - data/processed/interactions.parquet
      - data/processed/podcasts.parquet
      - models/embedder/
      - models/cf_model.pkl
    outs:
      - models/ranker.pkl
    metrics:
      - metrics/ranker_metrics.json:
          cache: false
    params:
      - configs/config.yaml:
          - ranker.num_leaves
          - ranker.learning_rate
          - ranker.n_estimators
          - ranker.candidate_pool_size

  # ── Stage 5: Evaluate full pipeline ──────────────────────────────────────
  evaluate:
    cmd: python -m src.models.recommender --synthetic --no-mlflow --save-dir models/pipeline
    deps:
      - src/models/recommender.py
      - models/embedder/
      - models/cf_model.pkl
      - models/ranker.pkl
    outs:
      - models/pipeline/
    metrics:
      - metrics/pipeline_metrics.json:
          cache: false
